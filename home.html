<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tools Hub 🤖</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      color: white;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 90%;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .card:hover {
      transform: scale(1.05);
      background: #f1f1f1;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🤖 AI Tools Hub</h1>

  <div class="grid">
    
    <a href="Quiz.html" class="card">
      🧠 Quiz Master
    </a>

    <a href="ai3.html" class="card">
      💬 AI Chat
    </a>

    <a href="affirmation.html" class="card">
      ✨ Daily Affirmation
    </a>

    <a href="joke.html" class="card">
      😂 Joke Generator
    </a>

  </div>
</div>

</body>
</html>
